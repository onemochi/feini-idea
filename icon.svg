<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- 蓝色渐变背景 -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5B9BD5"/>
      <stop offset="100%" style="stop-color:#2E75B5"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="40" fill="url(#grad1)"/>
  
  <!-- 合同文档图标 -->
  <g transform="translate(128, 120)">
    <!-- 文档背景 -->
    <rect x="-55" y="-65" width="110" height="130" rx="6" fill="white" opacity="0.95"/>
    <!-- 文档折角 -->
    <path d="M35,-65 L55,-65 L55,-45 Z" fill="#E8F0FF"/>
    <!-- 文字行 -->
    <rect x="-40" y="-40" width="60" height="8" rx="3" fill="#4472C4" opacity="0.8"/>
    <rect x="-40" y="-22" width="70" height="8" rx="3" fill="#4472C4" opacity="0.6"/>
    <rect x="-40" y="-4" width="55" height="8" rx="3" fill="#4472C4" opacity="0.8"/>
    <rect x="-40" y="14" width="65" height="8" rx="3" fill="#4472C4" opacity="0.6"/>
    <rect x="-40" y="32" width="50" height="8" rx="3" fill="#4472C4" opacity="0.8"/>
  </g>
  
  <!-- "菲尼" 文字（如果字体可用） -->
  <text x="128" y="220" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="38" font-weight="bold" fill="white" opacity="0.95">菲尼</text>
</svg>