<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>菲尼合同引擎 · 下载</title>
<style>
  :root {
    --primary: #4f46e5;
    --accent: #06b6d4;
    --bg: #f0f4ff;
    --text: #1e1b4b;
    --muted: #6b7280;
    --border: #dde3f8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(99,102,241,0.10) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(6,182,212,0.08) 0%, transparent 50%);
  }
  .card {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 24px;
    padding: 48px 56px;
    max-width: 560px;
    width: 100%;
    box-shadow: 0 12px 48px rgba(79,70,229,0.12);
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--primary), var(--accent));
  }
  .badge {
    display: inline-block;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--primary);
    border: 1.5px solid var(--primary);
    background: rgba(99,102,241,0.07);
    padding: 4px 14px;
    border-radius: 20px;
    margin-bottom: 16px;
    font-weight: 700;
  }
  h1 {
    font-size: 28px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }
  .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
  .version-tag {
    display: inline-block;
    font-size: 12px;
    color: var(--muted);
    background: #f3f4f6;
    padding: 4px 10px;
    border-radius: 6px;
    margin-bottom: 24px;
    font-family: monospace;
  }
  .btn-group { display: flex; flex-direction: column; gap: 12px; }
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 14px 24px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    text-decoration: none;
    transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    border: none;
    cursor: pointer;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--primary), var(--accent));
    color: white;
    box-shadow: 0 4px 20px rgba(79,70,229,0.3);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(79,70,229,0.4); }
  .btn-secondary {
    background: white;
    border: 1.5px solid var(--border);
    color: var(--text);
  }
  .btn-secondary:hover { border-color: var(--primary); color: var(--primary); }
  .info {
    margin-top: 28px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--muted);
    line-height: 1.7;
  }
  .info b { color: var(--text); }
  .info a { color: var(--primary); text-decoration: none; }
  code {
    background: #f3f4f6;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 11px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="badge">FEINI · CONTRACT ENGINE</div>
    <h1>菲尼合同引擎</h1>
    <p class="subtitle">Excel 智能合同生成 · Windows 系统级 OCR · 一键归档</p>
    <div class="version-tag" id="versionTag">读取版本中…</div>
    <div class="btn-group">
      <a class="btn btn-primary" id="btnInstaller" href="updates/" download>
        ⬇️ 下载安装版（推荐，支持自动更新）
      </a>
      <a class="btn btn-secondary" id="btnPortable" href="updates/" download>
        📦 下载便携版（绿色单文件，无自动更新）
      </a>
    </div>
    <div class="info">
      <p><b>系统要求：</b>Windows 10/11 (x64)，需启用中文语言包以使用系统 OCR。</p>
      <p><b>自动更新：</b>安装版启动时会自动检查 <code>/updates/latest.yml</code>，发现新版会在后台下载并提示重启。</p>
      <p style="margin-top:10px;">所有版本归档：<a href="updates/">查看 updates 目录</a></p>
    </div>
  </div>
  <script>
    // 解析 latest.yml 拿到当前版本号与文件名，自动填到下载按钮
    fetch('updates/latest.yml', { cache: 'no-cache' })
      .then(r => r.ok ? r.text() : Promise.reject('HTTP ' + r.status))
      .then(yml => {
        const v = (yml.match(/version:\s*(\S+)/) || [])[1];
        const file = (yml.match(/path:\s*(\S+)/) || [])[1];
        if (v) document.getElementById('versionTag').textContent = '当前版本 v' + v;
        if (file) {
          const inst = document.getElementById('btnInstaller');
          inst.href = 'updates/' + encodeURI(file);
          // 便携版命名规则：菲尼合同引擎-便携版-{version}.exe
          const portable = '菲尼合同引擎-便携版-' + v + '.exe';
          document.getElementById('btnPortable').href = 'updates/' + encodeURI(portable);
        }
      })
      .catch(err => {
        document.getElementById('versionTag').textContent = '版本信息暂不可用';
        console.warn(err);
      });
  </script>
</body>
</html>
